name: Terraform Apply (Main)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.filter.outputs.dev }}
      stage: ${{ steps.filter.outputs.stage }}
      prod: ${{ steps.filter.outputs.prod }}
      modules: ${{ steps.filter.outputs.modules }}
      bootstrap: ${{ steps.filter.outputs.bootstrap }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev:
              - 'envs/dev/**'
            stage:
              - 'envs/stage/**'
            prod:
              - 'envs/prod/**'
            modules:
              - 'modules/**'
            bootstrap:
              - 'bootstrap/github-actions/**'

  apply-dev:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.dev == 'true' ||
      needs.detect-changes.outputs.modules == 'true' ||
      needs.detect-changes.outputs.bootstrap == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: eks-infra
            dir: 01_eks_infra
            tfstate: dev/eks-infra.tfstate

          - name: eks-access
            dir: 02_eks_access
            tfstate: dev/eks-access.tfstate

          - name: argocd
            dir: 03_argocd
            tfstate: dev/argocd.tfstate

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ matrix.dir }}
        run: |
          terraform init \
            -backend-config=../global/backend.hcl \
            -backend-config="key=${{ matrix.tfstate }}"

      - name: Terraform Apply
        working-directory: ${{ matrix.dir }}
        run: |
          terraform apply \
            -var-file=dev.tfvars \
            -auto-approve \
            -input=false