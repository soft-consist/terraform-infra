name: Terraform Plan (PR)

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.filter.outputs.dev }}
      test: ${{ steps.filter.outputs.test }}
      prod: ${{ steps.filter.outputs.prod }}
      modules: ${{ steps.filter.outputs.modules }}
      bootstrap: ${{ steps.filter.outputs.bootstrap }}

    steps:
      - name : Checkout code 
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev:
              - 'envs/dev/**'
            test:
              - 'envs/test/**'
            prod:
              - 'envs/prod/**'
            modules:
              - 'modules/**'
            bootstrap:
              - 'bootstrap/github-actions/**'

  eks-infra:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.dev == 'true' ||
      needs.detect-changes.outputs.modules == 'true' ||
      needs.detect-changes.outputs.bootstrap == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: envs/dev/01_eks_infra
        run: |
          terraform init \
            -backend-config=../global/backend.hcl \
            -backend-config="key=dev/eks-infra.tfstate"

      - name: Terraform Validate
        working-directory: envs/dev/01_eks_infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: envs/dev/01_eks_infra
        run: |
          terraform plan \
            -var-file=dev.tfvars \
            -no-color \
            -out=plan.tfplan

      - name: Save Plan Output
        working-directory: envs/dev/01_eks_infra
        run: terraform show -no-color plan.tfplan > plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-eks-infra
          path: envs/dev/01_eks_infra/plan.txt
  
  eks-access:
    needs: eks-infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: envs/dev/02_eks_access
        run: |
          terraform init \
          -backend-config=../global/backend.hcl \
          -backend-config="key=dev/eks-access.tfstate"

      - name: Terraform Validate
        working-directory: envs/dev/02_eks_access
        run: terraform validate

      - name: Terraform Plan
        working-directory: envs/dev/02_eks_access
        run: |
            terraform plan \
              -var-file=dev.tfvars \
              -no-color \
              -out=plan.tfplan

      - name: Save Plan Output
        working-directory: envs/dev/02_eks_access
        run: terraform show -no-color plan.tfplan > plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-eks-access
          path: envs/dev/02_eks_access/plan.txt

  argocd:
    needs: eks-access
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: envs/dev/03_argocd
        run: |
          terraform init \
            -backend-config=../global/backend.hcl \
            -backend-config="key=dev/argocd.tfstate"

      - name: Terraform Validate
        working-directory: envs/dev/03_argocd
        run: terraform validate

      - name: Terraform Plan
        working-directory: envs/dev/03_argocd
        run: |
          terraform plan \
            -var-file=dev.tfvars \
            -no-color \
            -out=plan.tfplan

      - name: Save Plan Output
        working-directory: envs/dev/03_argocd
        run: terraform show -no-color plan.tfplan > plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: plan-argocd
          path: envs/dev/03_argocd/plan.txt

      - name: Notify PR (DEV)
        run: node scripts/terraform-notifier.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TF_ENV: dev
          PLAN_PATH: envs/dev/03_argocd/plan.txt
