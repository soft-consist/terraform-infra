name: Terraform Plan (PR)

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.filter.outputs.dev }}
      test: ${{ steps.filter.outputs.test }}
      prod: ${{ steps.filter.outputs.prod }}
      modules: ${{ steps.filter.outputs.modules }}
      bootstrap: ${{ steps.filter.outputs.bootstrap }}

    steps:
      - name : Checkout code 
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev:
              - 'envs/dev/**'
            test:
              - 'envs/test/**'
            prod:
              - 'envs/prod/**'
            modules:
              - 'modules/**'
            bootstrap:
              - 'bootstrap/github-actions/**'

  plan-dev:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.dev == 'true' ||
      needs.detect-changes.outputs.modules == 'true' ||
      needs.detect-changes.outputs.bootstrap == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: eks-infra
            dir: 01_eks_infra
            tfstate: dev/eks-infra.tfstate

          - name: eks-access
            dir: 02_eks_access
            tfstate: dev/eks-access.tfstate

          - name: argocd
            dir: 03_argocd
            tfstate: dev/argocd.tfstate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ matrix.dir }}
        run: |
          terraform init \
            -backend-config=../global/backend.hcl \
            -backend-config="key=${{ matrix.tfstate }}"

      - name: Terraform Validate
        working-directory: ${{ matrix.dir }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ matrix.dir }}
        run: |
          terraform plan \
            -var-file=dev.tfvars \
            -no-color \
            -out=plan.tfplan

      - name: Save Plan Output
        working-directory: ${{ matrix.dir }}
        run: terraform show -no-color plan.tfplan > plan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.name }}
          path: ${{ matrix.dir }}/plan.txt

      - name: Notify PR (DEV)
        run: node scripts/terraform-notifier.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TF_ENV: dev-${{ matrix.name }}
          PLAN_PATH: ${{ matrix.dir }}/plan.txt

